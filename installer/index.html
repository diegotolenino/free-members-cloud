<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Free Members — Setup Cloudflare</title>
<meta name="description" content="Configure sua plataforma de cursos em minutos. Roda 100% na sua conta Cloudflare." />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08080f;
    --surface: #111120;
    --surface-2: #181828;
    --surface-3: #1e1e32;
    --border: rgba(255,255,255,.07);
    --border-2: rgba(255,255,255,.13);
    --text: #eeeef8;
    --text-2: #8888aa;
    --text-3: #555570;
    --accent: #ff3d73;
    --accent-2: #ff7a45;
    --accent-glow: rgba(255,61,115,.18);
    --success: #22c55e;
    --success-bg: rgba(34,197,94,.1);
    --error-bg: rgba(239,68,68,.08);
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top nav ── */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,15,.85);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topnav-logo {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-weight: 700;
    font-size: .95rem;
    text-decoration: none;
    color: inherit;
  }

  .topnav-logo-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid;
    place-items: center;
    font-size: .95rem;
  }

  .topnav-links { display: flex; align-items: center; gap: 1.5rem; }
  .topnav-links a { font-size: .82rem; color: var(--text-2); text-decoration: none; transition: color .15s; }
  .topnav-links a:hover { color: var(--text); }
  .topnav-badge { font-size: .72rem; padding: .25rem .6rem; border-radius: 20px; border: 1px solid var(--border-2); color: var(--text-2); font-weight: 500; }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: 4rem 1.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(255,61,115,.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .75rem;
    font-weight: 600;
    padding: .3rem .85rem;
    border-radius: 20px;
    border: 1px solid rgba(255,61,115,.3);
    color: var(--accent);
    background: var(--accent-glow);
    margin-bottom: 1.25rem;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .hero h1 {
    font-size: clamp(1.75rem, 5vw, 2.75rem);
    font-weight: 800;
    letter-spacing: -.04em;
    line-height: 1.1;
    margin-bottom: .9rem;
    background: linear-gradient(135deg, #fff 30%, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p { font-size: 1rem; color: var(--text-2); line-height: 1.7; max-width: 480px; margin: 0 auto; }

  /* ── Main layout ── */
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 1rem 4rem; }
  .wizard { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── Progress ── */
  .progress-wrap {
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .progress-steps {
    display: flex;
    align-items: center;
    position: relative;
    min-height: 58px;
  }

  .progress-track {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .4s ease;
    border-radius: 2px;
  }

  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
    position: relative;
    z-index: 1;
  }

  .progress-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 2px solid var(--border-2);
    display: grid;
    place-items: center;
    font-size: .68rem;
    font-weight: 700;
    color: var(--text-3);
    transition: all .3s;
  }

  .progress-step.is-done .progress-dot { background: var(--success); border-color: var(--success); color: #fff; }
  .progress-step.is-active .progress-dot {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent; color: #fff;
    box-shadow: 0 0 0 5px var(--accent-glow);
  }

  .progress-label { font-size: .6rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-3); text-align: center; }
  .progress-step.is-active .progress-label { color: var(--accent); }
  .progress-step.is-done .progress-label { color: var(--success); }

  /* ── Card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .card-header { padding: 1.5rem 1.75rem 0; display: flex; flex-direction: column; gap: .3rem; }
  .card-eyebrow {
    font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent);
    display: flex; align-items: center; gap: .4rem;
  }
  .card-eyebrow::before { content: ''; display: inline-block; width: 16px; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 2px; }
  .card-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
  .card-desc { font-size: .875rem; color: var(--text-2); line-height: 1.65; padding-top: .1rem; }
  .card-body { padding: 1.25rem 1.75rem; display: flex; flex-direction: column; gap: 1rem; }
  .card-footer {
    padding: 1rem 1.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: .75rem;
    background: rgba(255,255,255,.02);
  }
  .card-footer .btn-primary { margin-left: auto; }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: .45rem; }
  .field-label { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-2); }
  .field-input {
    display: flex; align-items: center;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    border-radius: var(--radius-sm);
    transition: border-color .2s, box-shadow .2s;
  }
  .field-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .field-input input, .field-input select {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: .9rem; padding: .7rem .95rem;
    font-family: inherit; min-width: 0;
  }
  .field-input select option { background: var(--surface-2); }
  .field-input input::placeholder { color: var(--text-3); }
  .field-icon { padding: 0 .85rem 0 .65rem; color: var(--text-3); font-size: .95rem; flex-shrink: 0; }
  .field-hint { font-size: .78rem; color: var(--text-2); line-height: 1.55; }
  .field-hint a { color: var(--accent); text-decoration: none; }
  .field-hint a:hover { text-decoration: underline; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .45rem;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    font-size: .875rem; font-weight: 600; padding: .65rem 1.35rem;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    text-decoration: none; white-space: nowrap; font-family: inherit; letter-spacing: -.01em;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 4px 16px rgba(255,61,115,.3); }
  .btn-primary:not(:disabled):hover { box-shadow: 0 6px 24px rgba(255,61,115,.45); opacity: .92; }
  .btn-ghost { background: transparent; border: 1px solid var(--border-2); color: var(--text-2); }
  .btn-ghost:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
  .btn-success { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; box-shadow: 0 4px 16px rgba(34,197,94,.25); }
  .btn-cf { background: linear-gradient(135deg, #f48120, #f6a623); color: #fff; box-shadow: 0 4px 16px rgba(244,129,32,.3); width: 100%; padding: .85rem 1.25rem; font-size: .875rem; }

  /* ── Alerts ── */
  .alert { border-radius: var(--radius-sm); padding: .8rem 1rem; font-size: .86rem; line-height: 1.55; display: flex; gap: .6rem; align-items: flex-start; }
  .alert-icon { flex-shrink: 0; margin-top: .05rem; }
  .alert-error { background: var(--error-bg); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; }
  .alert-success { background: var(--success-bg); border: 1px solid rgba(34,197,94,.2); color: #86efac; }
  .alert-info { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2); color: #a5b4fc; }
  .alert-warning { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); color: #fcd34d; }

  /* ── Info boxes ── */
  .info-list { display: flex; flex-direction: column; gap: .4rem; }
  .info-row { display: flex; align-items: center; padding: .6rem .9rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); gap: .6rem; font-size: .85rem; }
  .info-row-label { color: var(--text-2); flex-shrink: 0; min-width: 90px; }
  .info-row-value { font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; font-size: .8rem; flex: 1; word-break: break-all; }
  .copy-btn { background: var(--surface-3); border: 1px solid var(--border); color: var(--text-2); cursor: pointer; padding: .25rem .55rem; border-radius: 6px; font-size: .7rem; font-family: inherit; flex-shrink: 0; transition: color .15s, background .15s; }
  .copy-btn:hover { color: var(--text); background: var(--border-2); }

  /* ── Feature grid ── */
  .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .feature-item { display: flex; align-items: flex-start; gap: .6rem; padding: .75rem .9rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .feature-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .05rem; }
  .feature-text strong { display: block; font-size: .85rem; margin-bottom: .1rem; }
  .feature-text small { font-size: .76rem; color: var(--text-2); line-height: 1.45; }

  /* ── Account list ── */
  .account-list { display: flex; flex-direction: column; gap: .4rem; max-height: 280px; overflow-y: auto; }
  .account-list::-webkit-scrollbar { width: 4px; }
  .account-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  .account-item { display: flex; align-items: center; gap: .85rem; padding: .85rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: border-color .2s, background .2s; background: none; text-align: left; color: inherit; width: 100%; font-family: inherit; }
  .account-item:hover { border-color: rgba(255,61,115,.35); background: rgba(255,61,115,.03); }
  .account-item.is-selected { border-color: var(--accent); background: rgba(255,61,115,.06); }
  .account-avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: grid; place-items: center; font-size: 1rem; flex-shrink: 0; font-weight: 700; color: #fff; }
  .account-info { flex: 1; min-width: 0; }
  .account-name { font-weight: 600; font-size: .9rem; }
  .account-id { font-size: .72rem; color: var(--text-2); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .account-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-2); display: grid; place-items: center; font-size: .65rem; color: transparent; transition: all .2s; flex-shrink: 0; }
  .account-item.is-selected .account-check { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Toggle ── */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); gap: 1rem; }
  .toggle-text strong { display: block; font-size: .875rem; margin-bottom: .1rem; }
  .toggle-text small { font-size: .76rem; color: var(--text-2); }
  .switch { position: relative; display: inline-block; width: 42px; height: 23px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track { position: absolute; inset: 0; background: var(--border-2); border-radius: 23px; cursor: pointer; transition: background .2s; }
  .switch-track::before { content: ''; position: absolute; width: 17px; height: 17px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch input:checked + .switch-track { background: var(--accent); }
  .switch input:checked + .switch-track::before { transform: translateX(19px); }

  /* ── Code block ── */
  .code-wrap { position: relative; background: #06060e; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: .5rem .9rem; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); }
  .code-lang { font-size: .7rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); }
  .code-body { padding: 1rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: .78rem; line-height: 1.75; color: #c9d1d9; overflow-x: auto; white-space: pre; }
  .hl { color: #79c0ff; } .hl2 { color: #d2a8ff; } .val { color: #a3e98c; } .cm { color: #6e7681; }

  /* ── Steps list ── */
  .steps-list { display: flex; flex-direction: column; gap: .4rem; }
  .step-row { display: flex; gap: .75rem; padding: .8rem .95rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-glow); border: 1px solid rgba(255,61,115,.3); color: var(--accent); font-size: .68rem; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; margin-top: .15rem; }
  .step-text { font-size: .86rem; line-height: 1.6; color: var(--text-2); flex: 1; }
  .step-text strong { color: var(--text); }
  .step-text code { font-family: 'SF Mono', monospace; font-size: .8rem; color: var(--accent); background: var(--accent-glow); padding: .1em .35em; border-radius: 4px; }

  /* ── Migration log ── */
  .mig-progress { display: flex; align-items: center; gap: 1rem; padding: .75rem 1rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .mig-ring { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .mig-ring svg { transform: rotate(-90deg); }
  .mig-ring-track { fill: none; stroke: var(--border-2); stroke-width: 3; }
  .mig-ring-fill { fill: none; stroke: url(#gradient); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .3s; }
  .mig-ring-label { position: absolute; inset: 0; display: grid; place-items: center; font-size: .62rem; font-weight: 700; color: var(--text); }
  .mig-info { flex: 1; min-width: 0; }
  .mig-info strong { display: block; font-size: .875rem; margin-bottom: .15rem; }
  .mig-info small { font-size: .78rem; color: var(--text-2); }

  .mig-log { background: #06060e; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .85rem 1rem; font-family: 'SF Mono', monospace; font-size: .75rem; line-height: 1.65; max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: .15rem; }
  .mig-log::-webkit-scrollbar { width: 3px; }
  .mig-log::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  .log-ok { color: #86efac; } .log-err { color: #fca5a5; } .log-info { color: #93c5fd; } .log-dim { color: var(--text-3); }

  /* ── Success ── */
  .success-screen { text-align: center; padding: 1.5rem 0 .5rem; }
  .success-icon-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--success-bg); border: 2px solid rgba(34,197,94,.3); display: grid; place-items: center; margin: 0 auto 1.25rem; font-size: 2rem; animation: pop .4s ease; }
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .success-screen h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .4rem; }
  .success-screen p { color: var(--text-2); font-size: .9rem; }

  /* ── Misc ── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { display: flex; align-items: center; gap: .85rem; color: var(--text-3); font-size: .75rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .footer { text-align: center; padding: 1.5rem; font-size: .78rem; color: var(--text-3); border-top: 1px solid var(--border); margin-top: 2rem; }
  .footer a { color: var(--text-2); text-decoration: none; }
  .footer a:hover { color: var(--text); }

  @media (max-width: 500px) {
    .topnav { padding: .85rem 1.1rem; }
    .hero { padding: 2.5rem 1rem 1.5rem; }
    .feature-grid { grid-template-columns: 1fr; }
    .field-row { grid-template-columns: 1fr; }
    .card-footer { flex-wrap: wrap; }
    .card-footer .btn-primary { margin-left: 0; width: 100%; }
    .progress-label { display: none; }
    .topnav-badge { display: none; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-logo" href="#">
    <div class="topnav-logo-icon">🎓</div>
    Free Members
  </a>
  <div class="topnav-links">
    <a href="https://github.com/diegotolenino/free-members-cloud" target="_blank">GitHub</a>
    <span class="topnav-badge">v0.1.0</span>
  </div>
</nav>

<div class="hero" id="hero">
  <div class="hero-pill">⚡ Setup em 5 minutos</div>
  <h1>Sua plataforma de cursos<br>no Cloudflare</h1>
  <p>Configure o Free Members na sua conta Cloudflare. Banco de dados, worker e primeiro admin — tudo automatizado.</p>
</div>

<div class="main">
  <div class="wizard">
    <div class="progress-wrap">
      <div class="progress-steps" id="progressSteps"></div>
    </div>
    <div class="card" id="stepCard"></div>
  </div>
</div>

<footer class="footer">
  <p>Free Members Cloud &middot; <a href="https://github.com/diegotolenino/free-members-cloud" target="_blank">GitHub</a> &middot; Suporte: <a href="mailto:emailfulldigital@gmail.com">emailfulldigital@gmail.com</a></p>
</footer>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d73"/>
      <stop offset="100%" style="stop-color:#ff7a45"/>
    </linearGradient>
  </defs>
</svg>

<script>
'use strict';

const S = {
  step:0, cfToken:'', user:null, accounts:[], account:null,
  db:null, bucket:null, createBucket:true,
  workerUrl:'', adminName:'', adminEmail:'', adminPassword:'',
  logs:[], migDone:false, migCount:0, migTotal:0, adminDone:false,
  error:'', loading:false,
};

const CF = 'https://api.cloudflare.com/client/v4';

async function cfGet(path) {
  const r = await fetch(`${CF}${path}`, { headers: { Authorization: `Bearer ${S.cfToken}` } });
  const d = await r.json();
  if (!d.success) throw new Error((d.errors||[]).map(e=>e.message).join(', ')||`CF ${r.status}`);
  return d.result;
}

async function cfPost(path, body) {
  const r = await fetch(`${CF}${path}`, {
    method:'POST', headers:{ Authorization:`Bearer ${S.cfToken}`, 'Content-Type':'application/json' }, body:JSON.stringify(body),
  });
  const d = await r.json();
  if (!d.success) throw new Error((d.errors||[]).map(e=>e.message).join(', ')||`CF ${r.status}`);
  return d.result;
}

async function d1Run(aid, dbId, sql) {
  const r = await fetch(`${CF}/accounts/${aid}/d1/database/${dbId}/query`, {
    method:'POST', headers:{ Authorization:`Bearer ${S.cfToken}`, 'Content-Type':'application/json' }, body:JSON.stringify({sql}),
  });
  const d = await r.json();
  if (!d.success) throw new Error((d.errors||[]).map(e=>e.message).join(', ')||`D1 ${r.status}`);
  return d;
}

function setHtml(id,h){const e=$(id);if(e)e.innerHTML=h;}
function copyText(t,b){navigator.clipboard.writeText(t).then(()=>{const o=b.textContent;b.textContent='✓ Copiado';setTimeout(()=>b.textContent=o,1600)}).catch(()=>{});}

function addLog(msg,type='info'){
  S.logs.push({msg,type});
  const el=$('migLog');
  if(el){el.innerHTML+=`<div class="log-${type}">${esc(msg)}</div>`;el.scrollTop=el.scrollHeight;}

function updateRing(done,total){
  S.migCount=done;S.migTotal=total;
  const pct=total?done/total:0;
  const circ=2*Math.PI*18;
  const f=$('ringFill');const l=$('ringLabel');const i=$('migInfoText');
  if(f)f.style.strokeDashoffset=circ*(1-pct);
  if(l)l.textContent=total?Math.round(pct*100)+'%':'';
  if(i)i.textContent=`${done} de ${total} instruções`;
}

function renderProgress(){
  const pct=STEPS.length>1?(S.step/(STEPS.length-1))*100:0;
  const stepsHtml=STEPS.map((s,i)=>{
    const cls=i<S.step?'is-done':i===S.step?'is-active':'';
    return `<div class="progress-step ${cls}"><div class="progress-dot">${i<S.step?'✓':i+1}</div><div class="progress-label">${esc(s.label)}</div></div>`;
  }).join('');
  setHtml('progressSteps',`<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>${stepsHtml}`);
}

  S.loading=true;S.error='';rToken();
  try{

    S.loading=false;goStep(2);

/* ── Step 5: Migrate ── */
function rMigrate(){
  const circ=2*Math.PI*18;
  const pct=S.migTotal?S.migCount/S.migTotal:0;
  const offset=circ*(1-pct);
  const ring=S.migTotal?`<div class="mig-progress"><div class="mig-ring"><svg viewBox="0 0 44 44" width="44" height="44"><circle class="mig-ring-track" cx="22" cy="22" r="18"/><circle class="mig-ring-fill" id="ringFill" cx="22" cy="22" r="18" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/></svg><div class="mig-ring-label" id="ringLabel">${Math.round(pct*100)}%</div></div><div class="mig-info"><strong>Executando migrações</strong><small id="migInfoText">${S.migCount} de ${S.migTotal} instruções</small></div></div>`:'' ;
  const log=S.logs.length?`<div class="mig-log" id="migLog">${S.logs.map(l=>`<div class="log-${l.type}">${esc(l.msg)}</div>`).join('')}</div>`:'';
  const done=S.migDone?`<div class="alert alert-success"><span class="alert-icon">✅</span><span>${MIGRATIONS.length} instruções executadas. Banco pronto!</span></div>`:'';
  const err=S.error?`<div class="alert alert-error"><span class="alert-icon">⚠️</span><span>${esc(S.error)}</span></div>`:'';
  setHtml('stepCard',`
    <div class="card-header"><div class="card-eyebrow">Passo 5 de 8</div><div class="card-title">Executar migrações</div><div class="card-desc">Criamos todas as tabelas no banco D1 via Cloudflare API. Leva alguns segundos.</div></div>
    <div class="card-body">${ring}${log}${done}${err}</div>
    <div class="card-footer"><button class="btn btn-ghost" onclick="goStep(4)">← Voltar</button>${S.migDone?`<button class="btn btn-primary" onclick="goStep(6)">Próximo →</button>`:`<button class="btn btn-primary" onclick="doMigrate()">${S.loading?'<span class="spinner"></span> Executando...':'⚙️ Executar migrações'}</button>`}</div>`);
  if(S.migTotal)setTimeout(()=>{const el=$('migLog');if(el)el.scrollTop=el.scrollHeight;},50);
}

async function doMigrate(){
  S.loading=true;S.error='';S.logs=[];S.migCount=0;S.migTotal=MIGRATIONS.length;
  rMigrate();
  const aid=S.account.id,dbId=S.db.uuid;
  addLog(`→ Banco: ${S.db.name} (${dbId.slice(0,8)}...)`,'info');
  addLog(`→ ${MIGRATIONS.length} instruções para executar`,'dim');
  let ok=0,fail=0;
  for(let i=0;i<MIGRATIONS.length;i++){
    const sql=MIGRATIONS[i].trim();
    try{
      await d1Run(aid,dbId,sql);
      addLog(`✓ ${sql.slice(0,60).replace(/\s+/g,' ')}…`,'ok');ok++;
    }catch(e){
      if(/already exists|duplicate/i.test(e.message)){addLog(`~ já existe (ok)`,'dim');ok++;}
      else{addLog(`✗ ERRO: ${e.message.slice(0,80)}`,'err');fail++;}
    }
    updateRing(i+1,MIGRATIONS.length);
    await new Promise(r=>setTimeout(r,90));
  }
  S.loading=false;
  if(fail===0){addLog(`\n✅ Concluído! ${ok} OK.`,'ok');S.migDone=true;}
  else{S.error=`${fail} instrução(ões) falharam. Verifique a permissão D1:Edit no token.`;}
  rMigrate();
}

<span class="hl">binding</span> = <span class="val">"DB"</span>
<span class="hl">database_name</span> = <span class="val">"${esc(dbName)}"</span>
<span class="hl">database_id</span> = <span class="val">"${esc(dbId)}"</span>${S.bucket?`\n\n[[<span class="hl2">r2_buckets</span>]]\n<span class="hl">binding</span> = <span class="val">"ASSETS"</span>\n<span class="hl">bucket_name</span> = <span class="val">"${esc(bkt)}"</span>`:''}</div>
      </div>
      <textarea id="tomlVal" style="display:none"></textarea>
      <div class="steps-list"><div class="step-row"><div class="step-num">3</div><div class="step-text"><code>npm install && npm run build && wrangler deploy</code></div></div></div>
    </div>
    <div class="card-footer"><button class="btn btn-ghost" onclick="goStep(5)">← Voltar</button><button class="btn btn-primary" onclick="goStep(7)">Já fiz o deploy →</button></div>`);
  setTimeout(()=>{const t=$('tomlVal');if(t)t.value=toml;},50);
}

/* ── Step 7: Admin ── */
function rAdmin(){
  const err=S.error?`<div class="alert alert-error"><span class="alert-icon">⚠️</span><span>${esc(S.error)}</span></div>`:'';
  const done=S.adminDone?`<div class="alert alert-success"><span class="alert-icon">✅</span><span>Administrador criado!</span></div>`:'';
  setHtml('stepCard',`
    <div class="card-header"><div class="card-eyebrow">Passo 7 de 8</div><div class="card-title">Criar administrador</div><div class="card-desc">Informe a URL do Worker publicado e os dados do primeiro admin.</div></div>
    <div class="card-body">
      <div class="field"><div class="field-label">URL do Worker</div><div class="field-input"><span class="field-icon">🌐</span><input type="url" id="workerUrlInput" placeholder="https://free-members-cloud.xxx.workers.dev" value="${esc(S.workerUrl)}" /></div><div class="field-hint">Encontre em Cloudflare → Workers &amp; Pages → seu worker.</div></div>
      <div class="field-row">
        <div class="field"><div class="field-label">Seu nome</div><div class="field-input"><input type="text" id="adminNameInput" placeholder="João Silva" value="${esc(S.adminName)}" /></div></div>
        <div class="field"><div class="field-label">E-mail</div><div class="field-input"><input type="email" id="adminEmailInput" placeholder="voce@email.com" value="${esc(S.adminEmail)}" /></div></div>
      </div>
      <div class="field"><div class="field-label">Senha (mín. 8 caracteres)</div><div class="field-input"><span class="field-icon">🔒</span><input type="password" id="adminPassInput" placeholder="••••••••" value="${esc(S.adminPassword)}" /></div></div>
      ${done}${err}
    </div>
    <div class="card-footer"><button class="btn btn-ghost" onclick="goStep(6)">← Voltar</button>${S.adminDone?`<button class="btn btn-primary" onclick="goStep(8)">Ver resultado →</button>`:`<button class="btn btn-primary" onclick="doCreateAdmin()">${S.loading?'<span class="spinner"></span> Criando...':'👤 Criar administrador'}</button>`}</div>`);
}
async function doCreateAdmin(){
  S.workerUrl=val('workerUrlInput').replace(/\/$/,'');
  S.adminName=val('adminNameInput');S.adminEmail=val('adminEmailInput');S.adminPassword=val('adminPassInput');S.error='';
  if(!S.workerUrl)return(S.error='Informe a URL do Worker.',rAdmin());
  if(!S.adminName)return(S.error='Informe o seu nome.',rAdmin());
  if(!S.adminEmail)return(S.error='Informe o e-mail.',rAdmin());
  if(S.adminPassword.length<8)return(S.error='A senha precisa ter pelo menos 8 caracteres.',rAdmin());
  S.loading=true;rAdmin();
  try{
    const r=await fetch(`${S.workerUrl}/api/install/owner`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:S.adminName,email:S.adminEmail,password:S.adminPassword})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||d.message||`HTTP ${r.status}`);
    S.adminDone=true;S.loading=false;rAdmin();
  }catch(e){S.loading=false;S.error=`Falha: ${e.message}. Verifique se o deploy foi concluído e a URL está correta.`;rAdmin();}
}

/* ── Step 8: Done ── */
function rDone(){
  const url=S.workerUrl||'https://seu-worker.workers.dev';
  setHtml('stepCard',`
    <div class="card-body" style="padding-top:1.75rem">
      <div class="success-screen"><div class="success-icon-wrap">🎉</div><h2>Instalação concluída!</h2><p>Sua plataforma está no ar. Acesse e comece a criar seus cursos.</p></div>
      <div class="info-list">
        <div class="info-row"><span class="info-row-label">🌐 Plataforma</span><span class="info-row-value">${esc(url)}</span><button class="copy-btn" onclick="copyText('${esc(url)}',this)">Copiar</button></div>
        <div class="info-row"><span class="info-row-label">🗄️ Banco</span><span class="info-row-value">${esc(S.db?.name||'—')}</span></div>
        <div class="info-row"><span class="info-row-label">👤 Admin</span><span class="info-row-value">${esc(S.adminEmail||'—')}</span></div>
        ${S.bucket?`<div class="info-row"><span class="info-row-label">📦 Bucket</span><span class="info-row-value">${esc(S.bucket.name)}</span></div>`:''}
      </div>
      <div class="steps-list">
        <div class="step-row"><div class="step-num">→</div><div class="step-text">Acesse <strong>${esc(url)}</strong> e faça login com seu e-mail e senha.</div></div>
        <div class="step-row"><div class="step-num">→</div><div class="step-text">Configure as <strong>integrações de pagamento</strong> (Mercado Pago, Pagar.me) no menu Integrações.</div></div>
        <div class="step-row"><div class="step-num">→</div><div class="step-text">Crie seu primeiro <strong>curso</strong> e configure um <strong>checkout</strong> para vender.</div></div>
      </div>
    </div>
    <div class="card-footer" style="justify-content:center;gap:1rem">
      <a class="btn btn-ghost" href="https://github.com/diegotolenino/free-members-cloud" target="_blank">📖 GitHub</a>
      <a class="btn btn-success" href="${esc(url)}" target="_blank">🚀 Acessar plataforma</a>
    </div>`);
}

renderStep();
</script>
